<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Intel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Inventory Intel</p>
          <h1>Retail Ops Control</h1>
          <p class="muted">Inventory management for small retail and e-commerce teams.</p>
        </div>
        <nav class="nav">
          <button data-view="dashboard" class="nav-link active">Dashboard</button>
          <button data-view="products" class="nav-link">Products</button>
          <button data-view="suppliers" class="nav-link">Suppliers</button>
          <button data-view="purchaseOrders" class="nav-link">Purchase Orders</button>
          <button data-view="customerOrders" class="nav-link">Customer Orders</button>
          <button data-view="inventory" class="nav-link">Inventory Ledger</button>
          <button data-view="imports" class="nav-link">Imports / Exports</button>
          <button data-view="audit" class="nav-link">Audit Log</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Operator</p>
            <input id="actorInput" value="Kenneth" />
          </div>
          <div class="topbar-actions">
            <button id="refreshBtn" class="primary">Refresh Data</button>
          </div>
        </header>

        <section id="flash" class="flash hidden"></section>

        <section id="dashboard" class="view active"></section>
        <section id="products" class="view"></section>
        <section id="suppliers" class="view"></section>
        <section id="purchaseOrders" class="view"></section>
        <section id="customerOrders" class="view"></section>
        <section id="inventory" class="view"></section>
        <section id="imports" class="view"></section>
        <section id="audit" class="view"></section>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
