<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Intel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button id="sidebarBackdrop" class="sidebar-backdrop" aria-label="Close menu"></button>

      <aside id="sidebar" class="sidebar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-bar brand-bar-sm"></span>
            <span class="brand-bar brand-bar-md"></span>
            <span class="brand-bar brand-bar-lg"></span>
            <span class="brand-bar brand-bar-md"></span>
          </div>
          <div>
            <p class="brand-name">Inventory Intel</p>
            <h1 class="brand-heading">Retail Ops Control</h1>
            <p class="brand-copy">Inventory management for small e-commerce businesses.</p>
          </div>
        </div>

        <nav class="nav" aria-label="Primary">
          <button data-view="dashboard" class="nav-link active">
            <span class="nav-icon">⌂</span>
            <span>Dashboard</span>
          </button>
          <button data-view="products" class="nav-link">
            <span class="nav-icon">◫</span>
            <span>Products</span>
          </button>
          <button data-view="suppliers" class="nav-link">
            <span class="nav-icon">◌</span>
            <span>Suppliers</span>
          </button>
          <button data-view="purchaseOrders" class="nav-link">
            <span class="nav-icon">⟟</span>
            <span>Purchase Orders</span>
          </button>
          <button data-view="customerOrders" class="nav-link">
            <span class="nav-icon">☰</span>
            <span>Customer Orders</span>
          </button>
          <button data-view="inventory" class="nav-link">
            <span class="nav-icon">≣</span>
            <span>Inventory Ledger</span>
          </button>
          <button data-view="imports" class="nav-link">
            <span class="nav-icon">⇅</span>
            <span>Imports / Exports</span>
          </button>
          <button data-view="insights" class="nav-link">
            <span class="nav-icon">✦</span>
            <span>AI Insights</span>
            <span class="nav-badge">New</span>
          </button>
          <button data-view="audit" class="nav-link">
            <span class="nav-icon">◍</span>
            <span>Audit Log</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="operator-card">
            <div id="operatorAvatar" class="operator-avatar">K</div>
            <div class="operator-meta">
              <strong id="operatorName">Kenneth</strong>
              <span>Operator</span>
            </div>
          </div>
          <label class="field">
            <span class="field-label">Operator name</span>
            <input id="actorInput" value="Kenneth" />
          </label>
        </div>
      </aside>

      <div class="content-shell">
        <main class="main-content">
          <header class="page-header">
            <div class="page-header-main">
              <button id="menuToggle" class="menu-toggle" aria-label="Open menu">☰</button>
              <div>
                <h2 id="pageTitle">Dashboard</h2>
                <p id="pageSubtitle">Overview of your inventory operations</p>
              </div>
            </div>

            <div class="page-actions">
              <button class="ghost-button" type="button">Jun 22 – Jun 28, 2026</button>
              <button id="refreshBtn" class="primary-button" type="button">Refresh Data</button>
            </div>
          </header>

          <section id="flash" class="flash hidden"></section>

          <section id="dashboard" class="view active"></section>
          <section id="products" class="view"></section>
          <section id="suppliers" class="view"></section>
          <section id="purchaseOrders" class="view"></section>
          <section id="customerOrders" class="view"></section>
          <section id="inventory" class="view"></section>
          <section id="imports" class="view"></section>
          <section id="insights" class="view"></section>
          <section id="audit" class="view"></section>
        </main>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
